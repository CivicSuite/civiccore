# Draft only. Do not install as `.github/workflows/release.yml` until the
# auditor authorizes the first release-class operation under this model.
#
# This workflow sketch shows the intended order:
# 1. build release artifacts
# 2. generate release-attestation.json using canonical JSON
# 3. sign the attestation with keyless Sigstore/cosign from this workflow
# 4. run the CivicCore provenance gate against fixtures and the prospective tag
# 5. publish only after the preflight gate passes

name: release-with-sigstore-attestation

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  draft-release-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e .[dev]
          echo "Install cosign with sigstore/cosign-installer@v4.1.1."

      - name: Build artifacts
        run: |
          python -m build
          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Generate release-attestation.json
        run: |
          echo "Generate canonical release-attestation.json from tag, commit, tree, workflow identity, run id, artifacts, and evidence bundle hashes."

      - name: Sign release attestation
        run: |
          echo "cosign sign-blob release-attestation.json --bundle release-attestation.json.bundle --yes"

      - name: Verify fixtures and prospective release
        run: |
          python scripts/verify-release-provenance.py --fixtures-dir tests/fixtures/release_provenance
          echo "python scripts/verify-release-provenance.py ${{ inputs.tag }} --attestation release-attestation.json --bundle release-attestation.json.bundle --artifacts-dir dist"
