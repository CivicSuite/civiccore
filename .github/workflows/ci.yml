name: civiccore CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Verify Docker is available
        run: docker version

      - name: Pre-pull pgvector image
        run: docker pull pgvector/pgvector:pg17

      - name: Install civiccore (editable, dev extras)
        run: |
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Run smoke test
        run: pytest tests/test_smoke.py -v --tb=short

      - name: Run baseline idempotency test
        run: pytest tests/test_baseline_idempotency.py -v --tb=short

      - name: Run LLM migration 0002 test
        run: pytest tests/test_llm_migration_0002.py -v --tb=short

      - name: Run LLM provider tests
        run: pytest tests/test_llm_providers.py -v --tb=short
